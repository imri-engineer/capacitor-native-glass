name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run lint
      - run: npm run build

  ios:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Resolve Swift package
        run: swift package resolve
